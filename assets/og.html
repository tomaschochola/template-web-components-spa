<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>tomaschochola/template-react-spa OG Card</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Google+Sans+Flex:opsz,wght@6..144,900&display=swap" />

    <style>
      :root {
        --card-surface: #141218;
        --card-text: #fffbff;
        --card-font-family: 'Google Sans Flex', 'Roboto', 'Noto Sans', system-ui, sans-serif;
        --card-title-size: 8rem;
        --card-logo-size: calc(var(--card-title-size) * 1.05);
        --card-gap: clamp(2rem, 6vmin, 5rem);
        background: var(--card-surface);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: var(--card-surface);
        color: var(--card-text);
        font-family: var(--card-font-family);
      }

      .card {
        display: grid;
        place-items: center;
        width: 100vw;
        height: 100vh;
        padding: clamp(2rem, 8vmin, 7rem);
        background: var(--card-surface);
      }

      .lockup {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: var(--card-gap);
        max-width: 88vw;
      }

      .logo {
        flex: 0 0 auto;
        width: var(--card-logo-size);
        height: var(--card-logo-size);
      }

      h1 {
        margin: 0;
        color: var(--card-text);
        font-size: var(--card-title-size);
        font-weight: 900;
        line-height: 1;
        letter-spacing: 0;
        white-space: nowrap;
      }
    </style>
  </head>
  <body>
    <main class="card" aria-label="tomaschochola/template-react-spa social card">
      <div class="lockup">
        <img class="logo" src="./icons/icon.svg" alt="" />
        <h1>tomaschochola/template-react-spa</h1>
      </div>
    </main>

    <script>
      const waitForImage = (image) => {
        const decodeImage = () => {
          if (image.naturalWidth === 0) {
            throw new Error(`Image failed to load: ${image.currentSrc || image.src}`);
          }

          return image.decode().catch(() => undefined);
        };

        if (image.complete) {
          return decodeImage();
        }

        return new Promise((resolve, reject) => {
          image.addEventListener('load', resolve, { once: true });
          image.addEventListener('error', reject, { once: true });
        }).then(decodeImage);
      };

      const fitTitle = () => {
        const card = document.querySelector('.card');
        const lockup = document.querySelector('.lockup');
        const title = document.querySelector('h1');

        const fits = () => {
          return lockup.scrollWidth <= card.clientWidth * 0.88 && lockup.scrollHeight <= card.clientHeight * 0.68;
        };

        let min = 24;
        let max = Math.min(220, card.clientHeight * 0.42, card.clientWidth * 0.22);

        for (let i = 0; i < 24; i += 1) {
          const mid = (min + max) / 2;

          document.documentElement.style.setProperty('--card-title-size', `${mid}px`);

          if (fits()) {
            min = mid;
          } else {
            max = mid;
          }
        }

        document.documentElement.style.setProperty('--card-title-size', `${min}px`);
      };

      Promise.all([document.fonts.ready, ...Array.from(document.images, waitForImage)])
        .then(fitTitle)
        .then(() => new Promise((resolve) => requestAnimationFrame(() => requestAnimationFrame(resolve))))
        .then(() => {
          document.documentElement.dataset.ogReady = 'true';
        });
    </script>
  </body>
</html>
