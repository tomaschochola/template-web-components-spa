networks:
  devcontainer:
    internal: false
services:
  devcontainer:
    build:
      context: './'
      dockerfile: './Dockerfile'
      target: 'devcontainer'
    command: 'sleep infinity'
    environment:
      APP_ENV: 'local'
      APP_VERSION: 'dev'
      NODE_ENV: 'development'
      NPM_CONFIG_CACHE: '/home/node/.npm'
    init: true
    networks:
      - 'devcontainer'
    ports:
      - '3000:3000'
    user: 'node:node'
    volumes:
      - './:/workspaces'
      - 'npm-cache:/home/node/.npm'
volumes:
  npm-cache:
    external: true
    name: 'tomaschochola-npm-cache'
