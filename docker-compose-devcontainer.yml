networks:
  devcontainer:
    internal: false
services:
  devcontainer:
    build:
      context: './'
      dockerfile: './Dockerfile'
      target: 'devcontainer'
    command: 'sleep infinity'
    environment:
      APP_ENV: 'local'
      APP_VERSION: 'dev'
      NODE_ENV: 'development'
    networks:
      - 'devcontainer'
    ports:
      - '3000:3000'
    user: 'node'
    volumes:
      - './:/workspaces'
